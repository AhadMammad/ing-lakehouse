# ─────────────────────────────────────────────────────────────────
#  RustFS — single-node mode (local development, plain HTTP)
#
#  Topology:
#    rustfs  (1 node, ports exposed directly — no NGINX/SSL)
#
#  Ports (host):
#    ${RUSTFS_S3_PORT:-9000}      S3 API  (HTTP)
#    ${RUSTFS_CONSOLE_PORT:-9001} Web console (HTTP, no cert needed)
#
#  For SSL mode use docker-compose.local.ssl.yml instead.
# ─────────────────────────────────────────────────────────────────

services:
  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:latest-glibc}
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin123}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_PORT: "9001"
      RUSTFS_OBS_LOGGER_LEVEL: ${RUSTFS_LOG_LEVEL:-info}
    ports:
      - "${RUSTFS_S3_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-sn-data:/data
    networks:
      - lakehouse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  rustfs-sn-data:

# lakehouse-net is defined in the root docker-compose.local.yml and inherited via include:
