# ─────────────────────────────────────────────────────────────────
#  RustFS NGINX — single-node mode
#  SSL termination for a single RustFS instance.
#
#  Port 9000  →  S3 API   (rustfs:9000)
#  Port 9001  →  Web console (rustfs:9001)
# ─────────────────────────────────────────────────────────────────

# ── S3 API ────────────────────────────────────────────────────────
server {
  listen 9000 ssl;

  ssl_certificate     /etc/nginx/certs/rustfs.pem;
  ssl_certificate_key /etc/nginx/certs/rustfs-key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # Support large object uploads (multipart, streaming)
  client_max_body_size 0;
  proxy_buffering      off;

  location / {
    proxy_pass         http://rustfs:9000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
  }
}

# ── Web console ───────────────────────────────────────────────────
server {
  listen 9001 ssl;

  ssl_certificate     /etc/nginx/certs/rustfs.pem;
  ssl_certificate_key /etc/nginx/certs/rustfs-key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  proxy_read_timeout    300s;
  proxy_connect_timeout 10s;

  location / {
    proxy_pass         http://rustfs:9001;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_http_version 1.1;
    # WebSocket support for live console updates
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
  }
}
