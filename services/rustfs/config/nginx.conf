# ─────────────────────────────────────────────────────────────────
#  RustFS NGINX — distributed mode
#  SSL termination + round-robin load balancing across 4 nodes.
#
#  Port 9000  →  S3 API   (round-robin: rustfs1-4:9000, HTTPS)
#  Port 9001  →  Console  (round-robin: rustfs1-4:9001, HTTPS)
# ─────────────────────────────────────────────────────────────────

# $upstream_addr logs which backend node handled each request.
log_format rustfs '$remote_addr -> $upstream_addr [$time_local] '
                  '"$request" $status $body_bytes_sent bytes '
                  '"$http_user_agent"';

upstream rustfs_cluster {
    server rustfs1:9000;
    server rustfs2:9000;
    server rustfs3:9000;
    server rustfs4:9000;
    keepalive 32;
}

upstream rustfs_console {
    server rustfs1:9001;
    server rustfs2:9001;
    server rustfs3:9001;
    server rustfs4:9001;
    keepalive 8;
}

# ── S3 API ────────────────────────────────────────────────────────
server {
    listen 9000 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/rustfs.pem;
    ssl_certificate_key /etc/nginx/certs/rustfs-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /dev/stdout rustfs;

    # Required for large object uploads (multipart, streaming)
    client_max_body_size 0;

    location / {
        proxy_pass              http://rustfs_cluster;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        proxy_connect_timeout   10s;
    }
}

# ── Web console ───────────────────────────────────────────────────
server {
    listen 9001 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/rustfs.pem;
    ssl_certificate_key /etc/nginx/certs/rustfs-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /dev/stdout rustfs;

    location / {
        proxy_pass              http://rustfs_console;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;

        # WebSocket support (console uses WS for live updates)
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";

        proxy_read_timeout      300s;
        proxy_connect_timeout   10s;
    }
}
