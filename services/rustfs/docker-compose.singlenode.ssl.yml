# ─────────────────────────────────────────────────────────────────
#  RustFS — single-node, SSL mode (no host ports — NGINX owns them)
#
#  Included via docker-compose.local.ssl.yml.
#  The shared NGINX proxy (services/nginx/) exposes ports 9000/9001.
# ─────────────────────────────────────────────────────────────────

services:
  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:latest-glibc}
    container_name: ing-lakehouse-rustfs
    env_file:
      - ../../.env
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin123}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_PORT: "9001"
      RUSTFS_OBS_LOGGER_LEVEL: ${RUSTFS_LOG_LEVEL:-info}
    volumes:
      - rustfs-sn-data:/data
    networks:
      - lakehouse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  rustfs-sn-data:
    name: ing-lakehouse_rustfs-sn-data

# lakehouse-net is defined in the root docker-compose.local.ssl.yml and inherited via include:
