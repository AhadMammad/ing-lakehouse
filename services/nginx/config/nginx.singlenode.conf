# ─────────────────────────────────────────────────────────────────
#  Lakehouse shared NGINX — single-node SSL proxy
#
#  All server blocks share the same self-signed cert (lakehouse.pem).
#  Generate with:  make setup-certs
#
#  To add a new service:
#    - Copy any server block below
#    - Change listen port and proxy_pass target
#    - Expose the port in services/nginx/docker-compose.singlenode.yml
# ─────────────────────────────────────────────────────────────────

# ── RustFS S3 API ─────────────────────────────────────────────────
server {
  listen 9000 ssl;

  ssl_certificate     /etc/nginx/certs/lakehouse.pem;
  ssl_certificate_key /etc/nginx/certs/lakehouse-key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  client_max_body_size 0;
  proxy_buffering      off;

  location / {
    proxy_pass         http://rustfs:9000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
  }
}

# ── RustFS Web Console ────────────────────────────────────────────
server {
  listen 9001 ssl;

  ssl_certificate     /etc/nginx/certs/lakehouse.pem;
  ssl_certificate_key /etc/nginx/certs/lakehouse-key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  proxy_read_timeout    300s;
  proxy_connect_timeout 10s;

  location / {
    proxy_pass         http://rustfs:9001;
    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
  }
}

