# ─────────────────────────────────────────────────────────────────
#  Spark — single-node mode (master only, local development)
#
#  Topology:
#    spark-master  (no workers — use local[*] or spark://spark-master:7077)
#
#  Ports (host):
#    ${SPARK_MASTER_UI_PORT:-8080}  Spark master web UI
#    ${SPARK_MASTER_PORT:-7077}     Spark master port (for job submission)
# ─────────────────────────────────────────────────────────────────

services:
  spark-master:
    image: ${SPARK_IMAGE:-apache/spark:3.5.3}
    container_name: ing-lakehouse-spark
    user: root
    env_file:
      - ../../.env
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    volumes:
      - spark-sn-work:/opt/spark/work
    networks:
      - lakehouse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  spark-sn-work:
    name: ing-lakehouse_spark-sn-work

# lakehouse-net is defined in the root docker-compose.local.yml and inherited via include:
