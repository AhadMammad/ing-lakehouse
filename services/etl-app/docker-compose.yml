# ─────────────────────────────────────────────────────────────────
#  etl-app — build-only service.
#
#  Declared so `make build-etl-app` can produce a per-instance image
#  ($(COMPOSE_PROJECT_NAME)-etl-app:latest) that Airflow's DockerOperator
#  references. The `build-only` profile keeps it out of `make up` —
#  containers are spawned on-demand by the DAG, not as long-lived services.
# ─────────────────────────────────────────────────────────────────

services:
  etl-app:
    image: ${COMPOSE_PROJECT_NAME:-ing-lakehouse}-etl-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["build-only"]
    networks:
      - lakehouse-net

# lakehouse-net is defined in the root docker-compose.local.yml and inherited via include:
