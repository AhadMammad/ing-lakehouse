# ─────────────────────────────────────────────────────────────────
#  Mailpit — dev SMTP capture server + web inbox
#
#  A lightweight, open-source SMTP sink. It accepts mail from anything
#  on lakehouse-net (e.g. Airflow alerts) and shows it in a web inbox —
#  it does NOT deliver to real external mailboxes. Perfect for dev: no
#  DNS, no TLS, no real credentials.
#
#  Topology:
#    mailpit  →  SMTP in (1025) + web inbox UI (8025)
#
#  Ports (host):
#    ${MAILPIT_UI_PORT:-8025}     Web inbox UI
#    ${MAILPIT_SMTP_PORT:-1025}   SMTP (also reachable in-network as mailpit:1025)
#
#  Airflow reaches it in-network via the smtp_default connection
#  (smtp://mailpit:1025) — see services/airflow/docker-compose.yml.
# ─────────────────────────────────────────────────────────────────

services:

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.21}
    environment:
      # Dev sink: accept any SMTP login (or none) over a plain connection.
      # To require real SMTP credentials later, drop these two and set
      # MP_SMTP_AUTH=user:bcrypt-hash (see Mailpit docs).
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - lakehouse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# lakehouse-net is defined in the root compose file and inherited via include.
# Container/volume names are intentionally NOT pinned — compose prefixes them
# with the project name so multi-instance setups don't collide.
