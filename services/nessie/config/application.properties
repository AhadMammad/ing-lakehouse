# Nessie Quarkus runtime configuration
# Mounted at /deployments/config/application.properties — always read by Quarkus

# Version store
nessie.version.store.type=ROCKSDB

# Iceberg catalog — default warehouse
nessie.catalog.default-warehouse=warehouse
nessie.catalog.warehouses.warehouse.location=s3://iceberg-warehouse/warehouse

# S3 / RustFS connection
nessie.catalog.service.s3.default-options.endpoint=http://rustfs:9000
nessie.catalog.service.s3.default-options.region=us-east-1
nessie.catalog.service.s3.default-options.path-style-access=true

# S3 credentials stored as Quarkus-native secrets (exact format from Nessie's own config example).
# Name/secret are expanded from the RUSTFS_* env vars (passed in via the nessie
# compose service) so Nessie stays in sync with the single source of truth in
# .env — the same RUSTFS_ACCESS_KEY/RUSTFS_SECRET_KEY every other service reads.
# The ${VAR:default} form keeps the documented rustfsadmin/rustfsadmin123 default
# when the env vars are absent.
nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:rustfs-creds
rustfs-creds.name=${RUSTFS_ACCESS_KEY:rustfsadmin}
rustfs-creds.secret=${RUSTFS_SECRET_KEY:rustfsadmin123}
