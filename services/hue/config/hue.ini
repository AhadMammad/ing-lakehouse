# ─────────────────────────────────────────────────────────────────
#  Hue — SQL interface configuration
#
#  Configured for single Trino interpreter against the Nessie catalog.
#  Admin credentials are auto-created via HUE_SUPERUSER_* env vars
#  (set in docker-compose) — no manual setup needed on first launch.
# ─────────────────────────────────────────────────────────────────

[desktop]
  secret_key=lakehouse-hue-secret
  http_host=0.0.0.0
  http_port=8888
  time_zone=UTC
  django_debug_mode=false

  [[database]]
    engine=sqlite3
    name=/tmp/hue.db

[notebook]
  [[interpreters]]
    [[[trino]]]
      name=Trino
      interface=trino
      options='{"url": "http://trino:8080"}'

[beeswax]
  # No Hive/Impala — Trino is the only SQL engine
  hive_server_host=
