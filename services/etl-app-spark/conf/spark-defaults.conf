# ─────────────────────────────────────────────────────────────────
#  Baked Spark defaults for the auth medallion cluster.
#
#  Two independent S3 access paths to RustFS:
#    1. Iceberg table data  → S3FileIO (AWS SDK v2). Credentials are set
#       PROGRAMMATICALLY in session.py from env, so they are NOT baked here.
#    2. Spark event logs     → Hadoop s3a (AWS SDK v1), configured below.
#
#  Nessie's Iceberg REST endpoint is unauthenticated here — no token config.
# ─────────────────────────────────────────────────────────────────

# ── Iceberg REST catalog (Nessie) ────────────────────────────────
spark.sql.extensions                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.nessie                      org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.type                 rest
spark.sql.catalog.nessie.uri                  http://nessie:19120/iceberg
spark.sql.catalog.nessie.warehouse            s3://iceberg-warehouse/warehouse
spark.sql.catalog.nessie.io-impl              org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.s3.endpoint          http://rustfs:9000
spark.sql.catalog.nessie.s3.path-style-access true
spark.sql.catalog.nessie.client.region        us-east-1
spark.sql.defaultCatalog                      nessie

# ── Hadoop s3a (Spark event logs to RustFS) ──────────────────────
spark.hadoop.fs.s3a.endpoint                  http://rustfs:9000
spark.hadoop.fs.s3a.path.style.access         true
spark.hadoop.fs.s3a.connection.ssl.enabled    false
spark.hadoop.fs.s3a.impl                      org.apache.hadoop.fs.s3a.S3AFileSystem
# Read keys from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env (mapped from
# RUSTFS_* on the Spark services) — keeps secrets out of this baked file.
spark.hadoop.fs.s3a.aws.credentials.provider  com.amazonaws.auth.EnvironmentVariableCredentialsProvider

# ── Event log + history server ───────────────────────────────────
spark.eventLog.enabled                        true
spark.eventLog.dir                            s3a://spark-history/events
spark.history.fs.logDirectory                 s3a://spark-history/events
