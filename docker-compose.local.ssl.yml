name: ing-lakehouse

# ─────────────────────────────────────────────────────────────────
#  SSL mode — single-node with shared NGINX SSL proxy.
#  RustFS: 1 node (no host ports)  |  Spark: master only
#  Kafka: 1 broker (KRaft)         |  NGINX: TLS for all UIs
#
#  Requires:  make setup-certs  (run once to generate certs/)
#
#  Use:  make up-ssl      Start SSL stack
#        make down-ssl    Stop SSL stack
#        make up          Start plain HTTP stack (no NGINX)
# ─────────────────────────────────────────────────────────────────

include:
  - services/rustfs/docker-compose.singlenode.ssl.yml
  - services/spark/docker-compose.singlenode.yml
  - services/kafka/docker-compose.singlenode.yml
  - services/nessie/docker-compose.singlenode.yml
  - services/jupyter/docker-compose.singlenode.yml
  - services/nginx/docker-compose.singlenode.yml

networks:
  lakehouse-net:
    driver: bridge
