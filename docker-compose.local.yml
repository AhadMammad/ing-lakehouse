name: ing-lakehouse

# ─────────────────────────────────────────────────────────────────
#  Local development mode — single-node, plain HTTP (no NGINX/SSL).
#  RustFS: 1 node (ports exposed directly)  |  Spark: master only
#  Kafka: 1 broker (KRaft)
#
#  Use:  make up          Start plain HTTP stack (default)
#        make down        Stop local stack
#        make up-ssl      Start with shared NGINX SSL proxy
#        make up-dist     Start distributed cluster for demos
# ─────────────────────────────────────────────────────────────────

include:
  - services/rustfs/docker-compose.singlenode.yml
  - services/spark/docker-compose.singlenode.yml
  - services/kafka/docker-compose.singlenode.yml
  - services/nessie/docker-compose.singlenode.yml
  - services/jupyter/docker-compose.singlenode.yml
  - services/trino/docker-compose.singlenode.yml
  - services/cloudbeaver/docker-compose.singlenode.yml

networks:
  # Shared network — every service attaches to this so cross-service
  # communication works without additional configuration.
  # Explicit subnet prevents Docker from exhausting its default pool on
  # shared VMs with multiple instances.  Set via NETWORK_SUBNET in .env.
  lakehouse-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-10.100.0.0/24}
