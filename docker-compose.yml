name: ing-lakehouse

# ─────────────────────────────────────────────────────────────────
#  Distributed mode — full cluster topology for demos.
#  RustFS: 4 nodes + NGINX LB  |  Spark: master + 2 workers
#  Kafka: 3 brokers (KRaft)
#
#  Use:  make up-dist     Start distributed cluster
#        make down-dist   Stop distributed cluster
#        make up          Start single-node local stack (default)
# ─────────────────────────────────────────────────────────────────

include:
  - services/rustfs/docker-compose.distributed.yml
  - services/spark/docker-compose.distributed.yml
  - services/kafka/docker-compose.distributed.yml
  - services/nessie/docker-compose.singlenode.yml
  - services/jupyter/docker-compose.singlenode.yml
  - services/trino/docker-compose.singlenode.yml
  - services/cloudbeaver/docker-compose.singlenode.yml
  # ── future services ──────────────────────────────────────────
  # - services/airflow/docker-compose.yml

networks:
  # Shared network — every service attaches to this so cross-service
  # communication works without additional configuration.
  # Explicit subnet prevents Docker from exhausting its default pool on
  # shared VMs with multiple instances.  Set via NETWORK_SUBNET in .env.
  lakehouse-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-10.100.0.0/24}
